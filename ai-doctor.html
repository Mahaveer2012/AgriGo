<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGRIGO | AI Crop Doctor</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .doctor-container {
            max-width: 600px;
            margin: 100px auto;
            padding: 30px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
        }
        #image-preview {
            width: 100%;
            max-height: 300px;
            object-fit: cover;
            border-radius: 15px;
            margin: 20px 0;
            display: none;
        }
        .result-box {
            margin-top: 20px;
            padding: 20px;
            border-radius: 12px;
            background: #f0fdf4;
            border: 1px solid #dcfce7;
            display: none;
            text-align: left;
        }
    </style>
</head>
<body class="auth-page-wrapper">
    <nav class="navbar" style="position: absolute; top: 0; width: 100%; box-sizing: border-box;">
        <div class="logo-group" style="display: flex; align-items: center;">
            <img src="logo.png" alt="AGRIGO" class="main-logo" style="height: 45px; border-radius: 50%;">
            <span class="brand-name" style="color: white; margin-left: 10px; font-weight: bold; font-size: 1.5rem;">AGRIGO</span>
        </div>
        <a href="index.html" style="color: white; text-decoration: none; font-weight: 600;">← Back</a>
    </nav>

    <div class="doctor-container">
        <h2 style="color: var(--primary);">AI Crop Doctor</h2>
        <p>Upload a photo of your infected crop to get an instant diagnosis.</p>
        
        <input type="file" id="crop-image" accept="image/*" style="margin: 20px 0;">
        <img id="image-preview" alt="Preview">
        
        <button id="analyze-btn" class="submit-btn" style="width: 100%;">Analyze Health</button>

        <div id="ai-result" class="result-box">
            <h4 style="margin-top: 0; color: #166534;">Diagnosis Result:</h4>
            <p id="diagnosis-text">Analyzing...</p>
        </div>
    </div>

    <script>// Use your project's most recent API Key
const API_KEY = "AIzaSyC8EKOKrlaabBHhT4fi-LL6mj9Q691i-AI"; 

const analyzeBtn = document.getElementById('analyze-btn');

analyzeBtn.addEventListener('click', async () => {
    const imageInput = document.getElementById('crop-image');
    const resultBox = document.getElementById('ai-result');
    const resultText = document.getElementById('diagnosis-text');

    if (!imageInput.files[0]) {
        alert("Please upload a leaf photo first!");
        return;
    }

    try {
        resultBox.style.display = 'block';
        resultText.innerHTML = "<em>Doctor is examining the leaf...</em>";
        analyzeBtn.disabled = true;

        const file = imageInput.files[0];
        const base64Data = await new Promise((resolve) => {
            const reader = new FileReader();
            reader.onloadend = () => resolve(reader.result.split(',')[1]);
            reader.readAsDataURL(file);
        });

        // Use the stable v1 endpoint for April 2026
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent?key=${API_KEY}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                contents: [{
                    parts: [
                        { text: "Identify the crop disease in this photo. Be specific about the name and give 2 clear steps for treatment. If no disease is found, say 'The crop appears healthy'." },
                        { inlineData: { mimeType: file.type, data: base64Data } }
                    ]
                }],
                // CRITICAL: Prevent safety filters from blocking leaf photos
                safetySettings: [
                    { category: "HARM_CATEGORY_DANGEROUS_CONTENT", threshold: "BLOCK_NONE" }
                ]
            })
        });

        const data = await response.json();

        // Check for common API errors in 2026
        if (data.error) {
            resultText.innerText = "API Error: " + data.error.message;
        } else if (data.candidates && data.candidates[0].content) {
            const diagnosis = data.candidates[0].content.parts[0].text;
            resultText.innerHTML = `<strong>Diagnosis:</strong><br>${diagnosis.replace(/\n/g, '<br>')}`;
        } else {
            resultText.innerText = "The AI is unsure. Try a clearer photo with better lighting.";
        }

    } catch (error) {
        console.error("Connection Error:", error);
        resultText.innerText = "Connection failed. Check your internet or API key.";
    } finally {
        analyzeBtn.disabled = false;
    }
});
    </script>
</body>
</html>
